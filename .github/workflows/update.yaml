name: Update Daily Arxiv Papers

on:
  schedule:
    - cron: '30 16 * * 0-4' # 每周一到周五，北京时间 00:30
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  issues: write

jobs:
  update_daily_papers:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # 最长运行时间

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Update papers
      run: python -u main.py > run.log 2>&1   # 保存日志到文件

    - name: Commit and push changes
      run: |
        git config --local user.email "northsi@qq.com"
        git config --local user.name "luyao"
        git add README.md .github/ISSUE_TEMPLATE.md
        git commit -m "✏️ Update papers automatically." || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create an issue to notify
      uses: JasonEtco/create-an-issue@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload logs
      uses: actions/upload-artifact@v3
      with:
        name: run-logs
        path: run.log
