# _config.yml
title: Daily ArXiv Papers
description: 自动获取的最新arXiv论文 | Automatically fetched papers from arXiv
author: Your Name
theme: jekyll-theme-primer

# 自定义导航
header_pages:
  - about.md
  - README.md

# 显示设置
show_downloads: false
google_analytics:

# 插件
plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jemoji

# 分页设置
paginate: 20
paginate_path: "/page:num/"

# 自定义样式
sass:
  style: compressed
